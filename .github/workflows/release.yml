name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release in this repo

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # builds archives + creates the Release in igorrize/agent-protocol
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # pushes the formula into igorrize/homebrew-tap (separate repo → needs a PAT)
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
